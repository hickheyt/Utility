<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <style>
    html,body{height:100%;margin:0;background:#000}
    iframe{width:100%;height:100%;border:0;display:block}
  </style>
</head>
<body>
  <iframe id="p"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
    allowfullscreen
    referrerpolicy="strict-origin-when-cross-origin">
  </iframe>
  <script>
    const v = new URL(location.href).searchParams.get('v');
    if (!v) document.body.textContent = 'Missing ?v=VIDEO_ID';
    else {
      // load without autoplay first so browser doesn't block it
      document.getElementById('p').src =
        'https://www.youtube-nocookie.com/embed/' + v + '?rel=0&enablejsapi=1';
    }
    // when moved into visible player, start playing
    window.addEventListener('message', e => {
      if (e.data === 'play') {
        const p = document.getElementById('p');
        // reload with autoplay now that user has interacted
        p.src = 'https://www.youtube-nocookie.com/embed/' + v + '?rel=0&autoplay=1';
      }
    });
  </script>
</body>
</html>
